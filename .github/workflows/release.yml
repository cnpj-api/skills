name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build skill.zip
        run: |
          cd skills/cnpj-api
          zip -r "$GITHUB_WORKSPACE/skill.zip" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }}
          files: skill.zip
          make_latest: "true"
